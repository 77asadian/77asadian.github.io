<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f7f7">

{% seo %}

<link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/img/favicons/favicon.png" sizes="96x96">
<link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/img/favicons/favicon.png">
<link rel="shortcut icon" href="{{ site.baseurl }}/assets/img/favicons/favicon.png">

<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/jekyll-theme-chirpy.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Source+Sans+Pro:wght@400;600;700;900&display=swap">

<script src="{{ site.baseurl }}/assets/js/dist/theme.min.js"></script>

{% if layout.layout == 'home' %}
  <script defer src="{{ site.baseurl }}/assets/js/dist/home.min.js"></script>
{% elsif layout.layout == 'post' or layout.layout == 'page' %}
  <script defer src="{{ site.baseurl }}/assets/js/dist/post.min.js"></script>
{% endif %}

<script defer src="{{ site.baseurl }}/app.min.js?baseurl={{ site.baseurl | url_encode }}&register=true" ></script>

<!-- Custom Styles for Modern Aesthetic and Layout Cleanup -->
<style>
  /* Import Modern Font */
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

  :root {
    --main-bg: transparent !important;
    --sidebar-bg: rgba(15, 23, 42, 0.4) !important;
    --topbar-bg: rgba(15, 23, 42, 0.4) !important;
    --card-bg: rgba(255, 255, 255, 0.03) !important;
    --text-color: #e2e8f0 !important;
    --link-color: #818cf8 !important;
    --link-hover-color: #c084fc !important;
  }

  body {
    font-family: 'Outfit', sans-serif !important;
    background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b) !important;
    background-size: 400% 400% !important;
    animation: gradientBG 15s ease infinite;
    color: var(--text-color);
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Glassmorphism Base Elements */
  #sidebar {
    background: var(--sidebar-bg) !important;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-right: 1px solid rgba(255, 255, 255, 0.05);
  }

  #topbar-wrapper {
    background: var(--topbar-bg) !important;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: none !important;
  }

  /* Content Area */
  .main-wrapper {
    background: transparent !important;
  }
  
  #main-wrapper {
    background: transparent !important;
  }

  /* Glassmorphism Post Cards */
  .post-preview {
    background: var(--card-bg) !important;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 20px !important;
    padding: 2rem !important;
    margin-bottom: 2rem !important;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
  }

  .post-preview:hover {
    transform: translateY(-8px) scale(1.01);
    background: rgba(255, 255, 255, 0.06) !important;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  /* Gradients for Text */
  h1, .post-title, #sidebar h1 {
    font-weight: 700 !important;
    letter-spacing: -0.02em;
    background: linear-gradient(to right, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
  }
  
  .post-preview .post-title {
    background: none;
    -webkit-background-clip: unset;
    -webkit-text-fill-color: unset;
    color: #f8fafc !important;
    transition: color 0.3s ease;
  }
  
  .post-preview:hover .post-title {
    background: linear-gradient(to right, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Profile Avatar Glow */
  .profile-wrapper img {
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(129, 140, 248, 0.4);
    transition: all 0.4s ease;
    border: 2px solid rgba(255, 255, 255, 0.1);
  }

  .profile-wrapper img:hover {
    box-shadow: 0 0 35px rgba(192, 132, 252, 0.6);
    transform: scale(1.05) rotate(5deg);
    border: 2px solid rgba(192, 132, 252, 0.5);
  }

  /* Animations */
  a {
    transition: all 0.2s ease !important;
  }

  /* Post Content Typography */
  .post-content {
    font-size: 1.1rem;
    line-height: 1.8;
  }
  
  /* Container adjustments for full width */
  .container {
    max-width: 1200px !important;
  }

  /* --- Previous Layout Cleanups --- */
  
  /* Hide the right sidebar panel (Recently Updated, Trending Tags, TOC) */
  #panel-wrapper {
    display: none !important;
  }

  /* Expand the main content area to full width and center it */
  main.col-12.col-lg-11.col-xl-9 {
    flex: 0 0 100% !important;
    max-width: 100% !important;
  }

  /* Hide Categories and Tags from the Post List (Home Page) */
  .post-preview .post-meta > div:nth-child(2),
  .post-preview .post-meta > div:has(i.fa-folder-open),
  .post-preview .post-meta > div:has(i.fa-tags) {
    display: none !important;
  }

  /* Hide Categories and Tags from the Post Page */
  .post-meta .post-categories,
  .post-meta i.fa-folder-open,
  .post-meta i.fa-tags,
  .post-tags {
    display: none !important;
  }

  /* Hide Categories and Tags from the left navigation sidebar */
  .nav-item:has(a[href*="/categories/"]),
  .nav-item:has(a[href*="/tags/"]) {
    display: none !important;
  }

  /* Additional cleanup for the post list meta row */
  .post-meta {
    justify-content: flex-start !important;
  }
</style>
